name: PitchAtlas
options:
  bundleIdPrefix: com.pitchatlas
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: CQNJJ423X3
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.0.0

targets:
  PitchAtlas:
    type: application
    platform: iOS
    sources:
      - path: PitchAtlas
    dependencies:
      - package: Supabase
        product: Supabase
    # An explicit, xcodegen-authored Info.plist (generated, gitignored) is required
    # because UIAppFonts is an array and Xcode's INFOPLIST_KEY_ generated-plist
    # mechanism only supports a fixed allowlist of scalar keys, not font arrays.
    info:
      path: PitchAtlas/Info.plist
      properties:
        CFBundleDisplayName: Pitch Atlas
        UIUserInterfaceStyle: Dark
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Export-compliance: no non-exempt encryption keeps TestFlight uploads moving.
        ITSAppUsesNonExemptEncryption: false
        # Bundled OFL typefaces (Resources/Fonts/*.ttf). Registered here so
        # Font.custom resolves the exact PostScript names the theme references.
        UIAppFonts:
          - Anton-Regular.ttf
          - Newsreader-Regular.ttf
          - Newsreader-Italic.ttf
          - HankenGrotesk-Regular.ttf
          - HankenGrotesk-Medium.ttf
          - MartianMono-Regular.ttf
        # Custom URL scheme for in-app deep links (pitchatlas://pitch/<slug>, etc.)
        CFBundleURLTypes:
          - CFBundleURLName: com.pitchatlas.app
            CFBundleURLSchemes:
              - pitchatlas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitchatlas.app
        CODE_SIGN_ENTITLEMENTS: PitchAtlas/PitchAtlas.entitlements
        # PRODUCT_NAME stays "PitchAtlas" (no space) so TEST_HOST resolves; the
        # spaced, user-facing label is carried by CFBundleDisplayName above.
        TARGETED_DEVICE_FAMILY: "1"            # iPhone only (v1)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    scheme:
      testTargets:
        - PitchAtlasTests
      gatherCoverageData: true

  PitchAtlasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PitchAtlasTests
    dependencies:
      - target: PitchAtlas
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
