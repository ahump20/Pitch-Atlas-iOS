name: PitchAtlas
options:
  bundleIdPrefix: com.pitchatlas
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # DEVELOPMENT_TEAM is intentionally not committed — configure signing locally
    # (Xcode › Signing & Capabilities) or in CI. Pitch Atlas ships under its own
    # signing identity.
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  PitchAtlas:
    type: application
    platform: iOS
    sources:
      - path: PitchAtlas
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pitchatlas.app
        # PRODUCT_NAME stays "PitchAtlas" (no space) so TEST_HOST resolves; the
        # spaced, user-facing label is carried by CFBundleDisplayName below.
        TARGETED_DEVICE_FAMILY: "1"            # iPhone only (v1)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_CFBundleDisplayName: Pitch Atlas
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        GENERATE_INFOPLIST_FILE: YES
    scheme:
      testTargets:
        - PitchAtlasTests
      gatherCoverageData: true

  PitchAtlasTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PitchAtlasTests
    dependencies:
      - target: PitchAtlas
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
